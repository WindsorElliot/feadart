name: assets_dealer
description: "A new Flutter package project."
version: 0.0.1
resolution: workspace

environment:
  sdk: ^3.11.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_gen_runner: ^5.13.0+1

dev_dependencies:
  build_runner: ^2.13.1
  flutter_gen: ^5.13.0+1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - assets/tyres/

flutter_gen:
  output: lib/src/gen/
  assets:
    outputs:
      package_parameter_enabled: true
